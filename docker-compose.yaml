# Setup up common configuration for Airflow services
x-airflow-common: &airflow-common
  build: .
  environment:
    # Run independent DAG tasks in parallel on this machine.
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__PARALLELISM: 8
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: 8
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    # Secret key for encrypting data in the Airflow database
    AIRFLOW__CORE__FERNET_KEY: PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
    # Remove default example DAGs to keep the environment clean
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Pause DAGs by default to prevent them from running immediately after creation
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    # Use basic authentication for the Airflow API (REST API)
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW_DATA_DIR: '/opt/airflow/data'
  volumes:
    - airflow_data:/opt/airflow        # persist Airflow's database and state
    - ./dags:/opt/airflow/dags         # live-edit your DAGs from your laptop
    - ./scripts:/opt/airflow/scripts   # same for scripts
    - ./data:/opt/airflow/data         # your input CSVs are visible inside container
    - ./datamart:/opt/airflow/datamart # DAG writes gold tables here, you see them locally
    - ./model_bank:/opt/airflow/model_bank # persist trained models and model logs locally

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
      start_period: 5s

  airflow-init:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_started
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_started
    command: scheduler

  # ── JupyterLab ──────────────────────────────────────────────────────────────
  jupyter:
    build: .
    container_name: jupyter_lab
    entrypoint: []              # clear the Airflow entrypoint so command runs directly
    ports:
      - "8888:8888"             # access at http://localhost:8888
    volumes:
      - .:/app                  # mounts project root into WORKDIR /app
    environment:
      - JUPYTER_ENABLE_LAB=yes  # force JupyterLab UI (not classic Notebook)
    command: ["jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--notebook-dir=/app", "--ServerApp.token=''", "--ServerApp.disable_check_xsrf=True"]
  # ────────────────────────────────────────────────────────────────────────────

volumes:
  airflow_data:
  postgres_data:
